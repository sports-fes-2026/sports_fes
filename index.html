<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>校内スポーツ大会 2026 速報</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* ── 既存のCSSをそのまま流用 ── */
  :root {
    --red: #e8192c; --red-dim: #9a0a18; --red-glow: rgba(232, 25, 44, 0.15);
    --dark: #080808; --mid: #111; --card: #161616; --card2: #1c1c1c;
    --border: #2a2a2a; --border2: #222; --text: #ececec; --muted: #555; --muted2: #777;
    --accent: #ff3a3a; --white: #fff;
    --header-h: 54px; --nav-h: 44px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  header { background: var(--dark); border-bottom: 1px solid var(--border); height: var(--header-h); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 3px; display: flex; align-items: center; gap: 8px; }
  .logo-bar { width: 3px; height: 18px; background: var(--red); border-radius: 1px; }
  .logo span { color: var(--red); }

  /* ── NAV (タブ) ── */
  nav { background: var(--mid); display: flex; overflow-x: auto; border-bottom: 1px solid var(--border2); height: var(--nav-h); position: sticky; top: var(--header-h); z-index: 190; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn { background: none; border: none; color: var(--muted); padding: 0 20px; height: 100%; cursor: pointer; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; flex-shrink: 0; font-weight: 700; letter-spacing: 1px; }
  .nav-btn.active { color: var(--white); border-bottom-color: var(--red); }

  /* ── PAGES ── */
  .page { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }
  .page.active { display: block; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 12px; }

  /* ── SCHEDULE CARDS ── */
  .schedule-list { display: flex; flex-direction: column; gap: 1px; }
  .schedule-card { background: var(--card); border-left: 2px solid transparent; padding: 12px 14px; display: flex; gap: 14px; align-items: center; }
  .schedule-card + .schedule-card { border-top: 1px solid var(--border2); }
  .schedule-card:first-child { border-radius: 6px 6px 0 0; }
  .schedule-card:last-child { border-radius: 0 0 6px 6px; }
  .schedule-card.live { border-left-color: var(--red); background: rgba(232, 25, 44, 0.04); }
  .schedule-time { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted); min-width: 40px; }
  .schedule-time.live-time { color: var(--red); }
  .schedule-info { flex: 1; min-width: 0; }
  .schedule-event { font-size: 11px; font-weight: 700; margin-bottom: 4px; color: var(--muted2); }
  .match-round-label { background: #2a2a2a; color: #ccc; padding: 2px 5px; border-radius: 3px; font-size: 9px; margin-left: 4px; }
  .match-teams-inline { font-size: 14px; font-weight: 900; margin-bottom: 2px; }
  .score-sep { color: var(--red); margin: 0 6px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }
  .schedule-detail { font-size: 10px; color: var(--muted); }
  .schedule-right { flex-shrink: 0; }
  
  .status-badge { font-size: 9px; padding: 3px 6px; border-radius: 2px; font-weight: 700; letter-spacing: 1px; display: inline-flex; align-items: center; }
  .status-live { background: var(--red); color: white; }
  .status-done { background: var(--border); color: var(--muted); }
  .status-upcoming { border: 1px solid var(--border); color: var(--muted); }
  
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .live-dot { width: 5px; height: 5px; background: #fff; border-radius: 50%; animation: pulse 1s infinite; margin-right: 4px; }

  /* ── FILTER (横スクロール式チップ) ── */
  .filter-row { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 16px; scrollbar-width: none; padding-bottom: 2px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { background: transparent; border: 1px solid var(--border); color: var(--muted2); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 11px; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; flex-shrink: 0; font-weight: 700; }
  .filter-chip.active { background: var(--red); border-color: var(--red); color: white; }

  /* ── TOURNAMENT ── */
  .tournament-wrap { overflow-x: auto; padding-bottom: 12px; }
  .tournament { display: flex; align-items: stretch; min-width: max-content; padding: 4px 0; gap: 10px; }
  .t-round { display: flex; flex-direction: column; min-width: 120px; }
  .t-round-label { font-size: 10px; color: var(--muted2); letter-spacing: 2px; text-align: center; padding: 4px 0 12px; border-bottom: 1px solid var(--border); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
  .t-matches { display: flex; flex-direction: column; justify-content: space-around; flex: 1; gap: 12px; }
  .t-match-group { display: flex; flex-direction: column; justify-content: center; position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .t-team { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
  .t-team:last-child { border-bottom: none; }
  .t-team.winner { background: rgba(232, 25, 44, 0.1); }
  .t-team.winner .t-name { color: var(--white); font-weight: 900; }
  .t-team.winner .t-score { color: var(--red); font-weight: 900; }
  .t-name { font-weight: 700; font-size: 12px; color: #ccc; }
  .t-score { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: #aaa; }
  .t-meta { text-align: center; font-size: 9px; color: var(--muted); background: #111; padding: 3px 0; border-top: 1px solid #222; letter-spacing: 1px; }
</style>
</head>
<body>

  <header>
    <div class="logo"><div class="logo-bar"></div>SPORTS <span>2026</span></div>
  </header>

  <nav>
    <button class="nav-btn active" onclick="goTab('day1', event)">1日目 (6/11)</button>
    <button class="nav-btn" onclick="goTab('day2', event)">2日目 (6/12)</button>
    <button class="nav-btn" onclick="goTab('tournament', event)">🏆 トーナメント表</button>
  </nav>

  <div id="tab-day1" class="page active">
    <div id="schedule-day1" class="schedule-list">読み込み中...</div>
  </div>

  <div id="tab-day2" class="page">
    <div id="schedule-day2" class="schedule-list">読み込み中...</div>
  </div>

  <div id="tab-tournament" class="page">
    <div class="filter-row" id="sport-chips"></div>
    <div class="tournament-wrap" id="tournament-container"></div>
  </div>

  <script src="data.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKyq02jcUWoqgy_SXL4_TLGXEKQvXMuMw",
      authDomain: "sports-fes-dc27c.firebaseapp.com",
      databaseURL: "https://sports-fes-dc27c-default-rtdb.firebaseio.com",
      projectId: "sports-fes-dc27c",
      storageBucket: "sports-fes-dc27c.firebasestorage.app",
      messagingSenderId: "649731204042",
      appId: "1:649731204042:web:7f1acd9887339a47c3a533"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 状態管理
    let liveData = { matches: {} };
    window.currentTournamentSport = '';

    // Firebaseデータのリアルタイム監視
    onValue(ref(db, 'matches'), snap => {
      liveData.matches = snap.val() || {};
      renderSchedule();
      renderTournament();
    });

    // ── タブ切り替え関数 ──
    window.goTab = function(id, e) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      e.currentTarget.classList.add('active');
    };

    // ── データの結合（data.js + Firebase） ──
    function getMergedMatches() {
      return matchData.map(m => {
        const fb = liveData.matches[m.id] || {};
        return {
          ...m,
          status: fb.status || m.status,
          score1: fb.score1 !== undefined ? fb.score1 : m.score1,
          score2: fb.score2 !== undefined ? fb.score2 : m.score2,
          team1: fb.team1 || m.team1,
          team2: fb.team2 || m.team2,
        };
      });
    }

    // ── スケジュールの描画（1日目・2日目） ──
    function renderSchedule() {
      const all = getMergedMatches();
      document.getElementById('schedule-day1').innerHTML = buildScheduleHtml(all.filter(m => m.day === 1));
      document.getElementById('schedule-day2').innerHTML = buildScheduleHtml(all.filter(m => m.day === 2));
    }

    function buildScheduleHtml(matches) {
      if (matches.length === 0) return '<div class="empty-state">試合がありません</div>';
      return matches.map(m => {
        const isRelayOrCeremony = m.sport === 'リレー' || m.sport === 'その他';
        let statusClass = m.status === 'live' ? 'live' : m.status === 'done' ? 'done' : '';
        let badgeHtml = '';
        
        if (m.status === 'live') badgeHtml = '<span class="status-badge status-live"><span class="live-dot"></span>LIVE</span>';
        else if (m.status === 'done') badgeHtml = '<span class="status-badge status-done">終了</span>';
        else badgeHtml = '<span class="status-badge status-upcoming">予定</span>';

        const s1 = m.score1 !== null ? m.score1 : '-';
        const s2 = m.score2 !== null ? m.score2 : '-';
        
        let vsHtml = '';
        if (isRelayOrCeremony) {
          vsHtml = `<div class="match-teams-inline" style="color:var(--white);">${m.team1}</div>`;
        } else {
          vsHtml = `<div class="match-teams-inline"><span>${m.team1}</span> <span class="score-sep">${s1} - ${s2}</span> <span>${m.team2}</span></div>`;
        }
        
        const icon = sportIcons && sportIcons[m.sport] ? sportIcons[m.sport] : '';

        return `
          <div class="schedule-card ${statusClass}">
            <div class="schedule-time ${m.status === 'live' ? 'live-time' : ''}">${m.time}</div>
            <div class="schedule-info">
              <div class="schedule-event">${icon} ${m.sport} <span class="match-round-label">${m.round}</span></div>
              ${vsHtml}
              <div class="schedule-detail">📍 ${m.venue}</div>
            </div>
            <div class="schedule-right">${badgeHtml}</div>
          </div>
        `;
      }).join('');
    }

    // ── トーナメント関連のロジック ──
    const circleNumbers = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳","㉑"];
    
    function getRoundCircle(roundStr) {
      for (let num of circleNumbers) {
        if (roundStr.includes(num)) return num;
      }
      return null;
    }

    function getRoundGroupIndex(roundStr, isJoshi) {
      const circle = getRoundCircle(roundStr);
      if (!circle) return -1;
      if (isJoshi) {
        if (["①", "②", "③"].includes(circle)) return 0;
        if (circle === "④") return 1;
      } else {
        if (["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑪"].includes(circle)) return 0;
        if (["⑧", "⑨", "⑩", "⑫", "⑬", "⑭"].includes(circle)) return 1;
        if (["⑮", "⑯", "⑰", "⑱"].includes(circle)) return 2;
        if (["⑲", "⑳"].includes(circle)) return 3;
        if (circle === "㉑") return 4;
      }
      return -1;
    }

    window.setTournamentSport = function(sport) {
      window.currentTournamentSport = sport;
      renderTournament();
    };

    function renderTournament() {
      const sports = typeof sportList !== 'undefined' ? sportList.filter(s => s !== 'リレー' && s !== 'その他') : [];
      if (!window.currentTournamentSport) window.currentTournamentSport = sports[0];

      // チップの描画
      document.getElementById('sport-chips').innerHTML = sports.map(s =>
        `<button class="filter-chip ${s === window.currentTournamentSport ? 'active' : ''}" onclick="setTournamentSport('${s}')">${s}</button>`
      ).join('');

      const allMatches = getMergedMatches();
      const sportMatches = allMatches.filter(m => m.sport === window.currentTournamentSport);
      
      if (sportMatches.length === 0) {
        document.getElementById('tournament-container').innerHTML = '<div class="empty-state">試合データがありません</div>';
        return;
      }

      const isJoshi = ["女子バスケ", "女子バレー", "女子バドミントン"].includes(window.currentTournamentSport);
      const roundNames = isJoshi ? ["予選・準決勝", "決勝"] : ["1回戦", "2回戦", "準々決勝", "準決勝", "決勝"];
      
      const grouped = roundNames.map(() => []);
      sportMatches.forEach(m => {
        const idx = getRoundGroupIndex(m.round, isJoshi);
        if (idx !== -1) grouped[idx].push(m);
      });

      // 丸数字順に並び替え
      grouped.forEach(list => {
        list.sort((a, b) => {
          const ca = getRoundCircle(a.round), cb = getRoundCircle(b.round);
          return circleNumbers.indexOf(ca) - circleNumbers.indexOf(cb);
        });
      });

      // トーナメント描画
      let html = '<div class="tournament">';
      grouped.forEach((list, ri) => {
        if (list.length === 0) return;
        html += `<div class="t-round"><div class="t-round-label">${roundNames[ri]}</div><div class="t-matches">`;
        list.forEach(m => {
          const w1 = m.status === 'done' && m.score1 !== null && m.score2 !== null && m.score1 > m.score2;
          const w2 = m.status === 'done' && m.score1 !== null && m.score2 !== null && m.score2 > m.score1;
          const sc1 = m.score1 !== null ? m.score1 : '-';
          const sc2 = m.score2 !== null ? m.score2 : '-';
          
          html += `
            <div class="t-match-group">
              <div class="t-team ${w1 ? 'winner' : ''}">
                <span class="t-name">${m.team1}</span>
                <span class="t-score">${sc1}</span>
              </div>
              <div class="t-team ${w2 ? 'winner' : ''}">
                <span class="t-name">${m.team2}</span>
                <span class="t-score">${sc2}</span>
              </div>
              <div class="t-meta">${m.round}</div>
            </div>
          `;
        });
        html += `</div></div>`;
      });
      html += '</div>';

      document.getElementById('tournament-container').innerHTML = html;
    }
  </script>
</body>
</html>
