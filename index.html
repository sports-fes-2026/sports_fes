<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スポーツ大会 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8192c;
    --dark: #0d0d0d;
    --mid: #1a1a1a;
    --card: #222222;
    --border: #333;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #ffcc00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--dark);
    border-bottom: 2px solid var(--red);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .logo span { color: var(--red); }

  .watchlist-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: border-color 0.2s;
  }
  .watchlist-btn:hover { border-color: var(--accent); color: var(--accent); }
  .watchlist-badge {
    background: var(--red);
    color: white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
  }
  .watchlist-badge.show { display: flex; }

  /* ===== NAV ===== */
  nav {
    background: var(--mid);
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    padding: 14px 22px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .nav-btn.active {
    color: var(--text);
    border-bottom-color: var(--red);
  }
  .nav-btn:hover { color: var(--text); }

  /* ===== PAGES ===== */
  .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
  .page.active { display: block; }

  /* ===== HOME ===== */
  .hero {
    background: linear-gradient(135deg, var(--red) 0%, #8b0000 100%);
    border-radius: 12px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '体育大会';
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    position: absolute;
    top: -20px; left: -10px;
    color: rgba(255,255,255,0.06);
    line-height: 1;
    pointer-events: none;
  }
  .hero-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 8px;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .hero-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 24px;
  }

  /* countdown */
  .countdown {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .cd-unit {
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    min-width: 64px;
  }
  .cd-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    display: block;
  }
  .cd-label {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }

  /* quick cards */
  .quick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .quick-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
  }
  .quick-card:hover { border-color: var(--red); transform: translateY(-2px); }
  .quick-card-icon { font-size: 24px; margin-bottom: 6px; }
  .quick-card-title { font-size: 13px; font-weight: 700; }
  .quick-card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* today section */
  .section-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ===== SCHEDULE ===== */
  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-bottom: 16px;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .filter-chip.active { background: var(--red); border-color: var(--red); color: white; }

  .schedule-list { display: flex; flex-direction: column; gap: 10px; }

  .schedule-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.2s;
    position: relative;
  }
  .schedule-card.watched { border-color: var(--accent); }
  .schedule-card.live { border-color: var(--red); }

  .schedule-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted);
    min-width: 48px;
    line-height: 1.2;
  }
  .schedule-time.live-time { color: var(--red); }

  .schedule-info { flex: 1; }
  .schedule-event { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .schedule-detail { font-size: 12px; color: var(--muted); }

  .schedule-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

  .status-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .status-live { background: var(--red); color: white; }
  .status-done { background: var(--border); color: var(--muted); }
  .status-upcoming { background: transparent; border: 1px solid var(--border); color: var(--muted); }

  .watch-toggle {
    background: none;
    border: 1px solid var(--border);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--muted);
  }
  .watch-toggle.on { background: var(--accent); border-color: var(--accent); color: #000; }

  /* result score */
  .result-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent);
  }

  /* ===== EVENTS ===== */
  .event-grid { display: flex; flex-direction: column; gap: 10px; }
  .event-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .event-card:hover { border-color: var(--red); }
  .event-icon { font-size: 28px; width: 44px; text-align: center; }
  .event-info { flex: 1; }
  .event-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .event-meta { font-size: 12px; color: var(--muted); }
  .event-arrow { color: var(--muted); font-size: 18px; }

  /* ===== MAP ===== */
  .map-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .map-svg-area {
    width: 100%;
    aspect-ratio: 4/3;
    position: relative;
    background: #1a2a1a;
  }
  .map-svg-area svg { width: 100%; height: 100%; }

  .map-legend { padding: 16px; }
  .legend-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== WATCHLIST PAGE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--mid);
    border-radius: 16px 16px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 600px;
    border-top: 1px solid var(--border);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal-detail-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .modal-detail-row:last-of-type { border-bottom: none; }
  .modal-detail-label { color: var(--muted); }
  .modal-close {
    background: var(--red);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    width: 100%;
    margin-top: 16px;
  }

  /* live pulse */
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
    margin-right: 4px;
  }

  /* ===== RESULTS BANNER ===== */
  .results-banner {
    background: linear-gradient(90deg, #8b0000, var(--red));
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rb-label { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
  .rb-score { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
  .rb-teams { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 2px; }

</style>
</head>

<script>
// ============================================================
// ★ データ — ここを自分たちの体育大会に合わせて書き換えてね！
// ============================================================

// 体育大会の日付（年, 月-1, 日, 時, 分, 秒）
const TARGET_DATE = new Date(2026, 6, 11, 9, 0, 0); // 例: 2026年9月15日 9:00

// ============================================================
// アプリロジック
// ============================================================

let watchlist = JSON.parse(localStorage.getItem('wl') || '[]');
let currentFilter = 'すべて';

function saveWL() {
  localStorage.setItem('wl', JSON.stringify(watchlist));
  updateBadge();
}

function updateBadge() {
  const badge = document.getElementById('wl-badge');
  if (watchlist.length > 0) {
    badge.textContent = watchlist.length;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// ページ切り替え
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const navBtns = document.querySelectorAll('.nav-btn');
  const pageOrder = ['home', 'schedule', 'events', 'map', 'watchlist'];
  const idx = pageOrder.indexOf(id);
  if (idx >= 0) navBtns[idx].classList.add('active');

  if (id === 'schedule') renderSchedule();
  if (id === 'watchlist') renderWatchlist();
}

// カウントダウン
function updateCountdown() {
  const now = new Date();
  const diff = TARGET_DATE - now;
  if (diff <= 0) {
    ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
}

// スケジュール
function renderSchedule() {
  // フィルター
  const cats = ['すべて', ...new Set(scheduleData.map(s => s.category))];
  const fr = document.getElementById('filter-row');
  fr.innerHTML = cats.map(c =>
    `<button class="filter-chip ${c === currentFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  const filtered = currentFilter === 'すべて'
    ? scheduleData
    : scheduleData.filter(s => s.category === currentFilter);

  const list = document.getElementById('schedule-list');
  list.innerHTML = filtered.map(s => {
    const isWatched = watchlist.includes(s.id);
    const statusClass = s.status === 'live' ? 'status-live' : s.status === 'done' ? 'status-done' : 'status-upcoming';
    const statusLabel = s.status === 'live' ? '● LIVE' : s.status === 'done' ? '終了' : '予定';
    return `
      <div class="schedule-card ${isWatched ? 'watched' : ''} ${s.status === 'live' ? 'live' : ''}">
        <div class="schedule-time ${s.status === 'live' ? 'live-time' : ''}">${s.time}</div>
        <div class="schedule-info">
          <div class="schedule-event">${s.event}</div>
          <div class="schedule-detail">📍 ${s.place}${s.result ? ' · ' + s.result : ''}</div>
        </div>
        <div class="schedule-right">
          <span class="status-badge ${statusClass}">${statusLabel}</span>
          ${s.result && s.status === 'done' ? `<div class="result-score">${s.result.includes('-') ? s.result.split(': ')[1] || s.result : ''}</div>` : ''}
          <button class="watch-toggle ${isWatched ? 'on' : ''}" onclick="toggleWatch(${s.id})">⭐</button>
        </div>
      </div>
    `;
  }).join('');
}

function setFilter(cat) {
  currentFilter = cat;
  renderSchedule();
}

function toggleWatch(id) {
  if (watchlist.includes(id)) {
    watchlist = watchlist.filter(w => w !== id);
  } else {
    watchlist.push(id);
  }
  saveWL();
  renderSchedule();
}

// 各種目
function renderEvents() {
  document.getElementById('event-grid').innerHTML = eventData.map((e, i) => `
    <div class="event-card" onclick="showEventModal(${i})">
      <div class="event-icon">${e.icon}</div>
      <div class="event-info">
        <div class="event-name">${e.name}</div>
        <div class="event-meta">${e.meta} · ${e.place}</div>
      </div>
      <div class="event-arrow">›</div>
    </div>
  `).join('');
}

function showEventModal(i) {
  const e = eventData[i];
  document.getElementById('modal-body').innerHTML = `
    <div style="font-size:36px;margin-bottom:8px">${e.icon}</div>
    <div class="modal-title">${e.name}</div>
    <div class="modal-sub">${e.meta}</div>
    <div class="modal-detail-row"><span class="modal-detail-label">会場</span><span>${e.place}</span></div>
    <div class="modal-detail-row"><span class="modal-detail-label">ルール</span><span style="text-align:right;max-width:220px;line-height:1.6">${e.rule}</span></div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ウォッチリスト
function renderWatchlist() {
  const el = document.getElementById('watchlist-content');
  const items = scheduleData.filter(s => watchlist.includes(s.id));
  if (items.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-text">スケジュールから⭐を押して<br>気になる競技を追加しよう</div></div>`;
    return;
  }
  el.innerHTML = `<div class="schedule-list">${items.map(s => {
    const statusClass = s.status === 'live' ? 'status-live' : s.status === 'done' ? 'status-done' : 'status-upcoming';
    const statusLabel = s.status === 'live' ? '● LIVE' : s.status === 'done' ? '終了' : '予定';
    return `
      <div class="schedule-card watched ${s.status === 'live' ? 'live' : ''}">
        <div class="schedule-time">${s.time}</div>
        <div class="schedule-info">
          <div class="schedule-event">${s.event}</div>
          <div class="schedule-detail">📍 ${s.place}${s.result ? ' · ' + s.result : ''}</div>
        </div>
        <div class="schedule-right">
          <span class="status-badge ${statusClass}">${statusLabel}</span>
          <button class="watch-toggle on" onclick="removeWatch(${s.id})">⭐</button>
        </div>
      </div>
    `;
  }).join('')}</div>`;
}

function removeWatch(id) {
  watchlist = watchlist.filter(w => w !== id);
  saveWL();
  renderWatchlist();
}

// ホームのNEXT UP
function renderHomeNext() {
  const upcoming = scheduleData.filter(s => s.status === 'upcoming').slice(0, 2);
  document.getElementById('home-next').innerHTML = `<div class="schedule-list">${upcoming.map(s => `
    <div class="schedule-card">
      <div class="schedule-time">${s.time}</div>
      <div class="schedule-info">
        <div class="schedule-event">${s.event}</div>
        <div class="schedule-detail">📍 ${s.place}</div>
      </div>
      <div class="schedule-right">
        <span class="status-badge status-upcoming">予定</span>
      </div>
    </div>
  `).join('')}</div>`;
}
