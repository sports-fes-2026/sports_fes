<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スポーツ大会 速報＆スケジュール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
        /* 横スクロールのスクロールバーを非表示にする（スマホ用） */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen pb-12">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 text-center sm:text-left flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">🏆 スポーツ大会 速報サイト</h1>
                <p class="text-blue-100 text-sm mt-1">試合スケジュール＆結果のリアルタイム案内</p>
            </div>
            <div id="countdown-area" class="bg-black/20 backdrop-blur-sm rounded-lg px-4 py-2 text-sm inline-block sm:self-center">
                <span id="countdown-timer" class="font-medium text-gray-100">読み込み中...</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
        
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-white p-3 rounded-xl border border-gray-200 shadow-sm text-center">
                <div class="text-xs text-gray-500 font-medium">全試合</div>
                <div id="counter-all" class="text-xl sm:text-2xl font-bold text-gray-700">-</div>
            </div>
            <div class="bg-red-50 p-3 rounded-xl border border-red-100 shadow-sm text-center">
                <div class="text-xs text-red-600 font-medium">● 進行中</div>
                <div id="counter-live" class="text-xl sm:text-2xl font-bold text-red-600">-</div>
            </div>
            <div class="bg-gray-100 p-3 rounded-xl border border-gray-200 shadow-sm text-center">
                <div class="text-xs text-gray-600 font-medium">終了済</div>
                <div id="counter-done" class="text-xl sm:text-2xl font-bold text-gray-600">-</div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-6 sticky top-0 z-10 opacity-95 backdrop-blur">
            <div class="flex border-b border-gray-200 mb-4 bg-gray-100 p-1 rounded-lg">
                <button data-day="all" class="filter-day-btn flex-1 py-2 text-center text-sm font-medium rounded-md bg-white text-blue-600 shadow-sm transition-all focus:outline-none">全日程</button>
                <button data-day="1" class="filter-day-btn flex-1 py-2 text-center text-sm font-medium rounded-md text-gray-600 hover:text-gray-900 transition-all focus:outline-none">1日目</button>
                <button data-day="2" class="filter-day-btn flex-1 py-2 text-center text-sm font-medium rounded-md text-gray-600 hover:text-gray-900 transition-all focus:outline-none">2日目</button>
            </div>

            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="w-full md:flex-1 order-2 md:order-1">
                    <div class="text-xs text-gray-400 font-medium mb-1.5 px-1">競技で絞り込む</div>
                    <div id="sport-filter-container" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar snap-x">
                        </div>
                </div>

                <div class="w-full md:w-48 order-1 md:order-2 self-end md:self-auto">
                    <div class="text-xs text-gray-400 font-medium mb-1.5 px-1">状態</div>
                    <select id="status-filter" class="block w-full rounded-lg border border-gray-300 text-sm p-2 bg-white shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-medium text-gray-700">
                        <option value="all">すべての試合</option>
                        <option value="upcoming">試合予定</option>
                        <option value="live">🔥 進行中 (LIVE)</option>
                        <option value="done">✅ 試合終了</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="match-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </main>

    <script src="data.js"></script>

    <script>
        // 現在適用されているフィルターの状態
        let currentFilters = {
            day: 'all',   // 'all', 1, 2
            sport: 'all', // 'all', 'サッカー', 'バスケ' など
            status: 'all' // 'all', 'upcoming', 'live', 'done'
        };

        // 初期化処理
        document.addEventListener('DOMContentLoaded', () => {
            initDayFilters();
            initSportFilters();
            initStatusFilter();
            updateSummaryCounters();
            renderMatches();
            
            // カウントダウンの開始
            setInterval(updateCountdown, 1000);
            updateCountdown();
        });

        // 1. 日程フィルターの初期化
        function initDayFilters() {
            const dayBtns = document.querySelectorAll('.filter-day-btn');
            dayBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    dayBtns.forEach(b => {
                        b.className = 'filter-day-btn flex-1 py-2 text-center text-sm font-medium rounded-md text-gray-600 hover:text-gray-900 transition-all focus:outline-none';
                    });
                    e.currentTarget.className = 'filter-day-btn flex-1 py-2 text-center text-sm font-medium rounded-md bg-white text-blue-600 shadow-sm transition-all focus:outline-none';
                    
                    currentFilters.day = e.currentTarget.dataset.day;
                    renderMatches();
                });
            });
        }

        // 2. 競技フィルターの動的生成＆初期化
        function initSportFilters() {
            const container = document.getElementById('sport-filter-container');
            container.innerHTML = '';

            // 「すべて」ボタンの作成
            const allBtn = document.createElement('button');
            allBtn.className = 'filter-sport-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-blue-600 text-white shadow-sm whitespace-nowrap snap-shrink transition-all';
            allBtn.textContent = 'すべて';
            allBtn.dataset.sport = 'all';
            allBtn.addEventListener('click', (e) => selectSport('all', e.currentTarget));
            container.appendChild(allBtn);

            // data.js の sportList からボタンを自動生成
            sportList.forEach(sport => {
                const btn = document.createElement('button');
                btn.className = 'filter-sport-btn px-4 py-1.5 rounded-full text-xs font-medium bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 whitespace-nowrap snap-shrink transition-all';
                const icon = sportIcons[sport] || '🏆';
                btn.textContent = `${icon} ${sport}`;
                btn.dataset.sport = sport;
                btn.addEventListener('click', (e) => selectSport(sport, e.currentTarget));
                container.appendChild(btn);
            });
        }

        // 競技選択時の挙動
        function selectSport(sport, targetBtn) {
            currentFilters.sport = sport;
            document.querySelectorAll('.filter-sport-btn').forEach(btn => {
                btn.className = 'filter-sport-btn px-4 py-1.5 rounded-full text-xs font-medium bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 whitespace-nowrap snap-shrink transition-all';
            });
            targetBtn.className = 'filter-sport-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-blue-600 text-white shadow-sm whitespace-nowrap snap-shrink transition-all';
            renderMatches();
        }

        // 3. ステータスフィルターの初期化
        function initStatusFilter() {
            document.getElementById('status-filter').addEventListener('change', (e) => {
                currentFilters.status = e.target.value;
                renderMatches();
            });
        }

        // 上部集計カウンターの更新
        function updateSummaryCounters() {
            document.getElementById('counter-all').textContent = matchData.length;
            document.getElementById('counter-live').textContent = matchData.filter(m => m.status === 'live').length;
            document.getElementById('counter-done').textContent = matchData.filter(m => m.status === 'done').length;
        }

        // 試合一覧のフィルタリングと描画処理
        function renderMatches() {
            const container = document.getElementById('match-list-container');
            container.innerHTML = '';

            // フィルター条件に合うデータを抽出
            const filteredMatches = matchData.filter(match => {
                if (currentFilters.day !== 'all' && match.day !== parseInt(currentFilters.day)) return false;
                if (currentFilters.sport !== 'all' && match.sport !== currentFilters.sport) return false;
                if (currentFilters.status !== 'all' && match.status !== currentFilters.status) return false;
                return true;
            });

            // 該当試合がない場合の表示
            if (filteredMatches.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full bg-white rounded-xl border border-gray-200 p-12 text-center text-gray-400 font-medium">
                        🔍 条件に一致する試合がありません
                    </div>
                `;
                return;
            }

            // カードを1枚ずつ生成して追加
            filteredMatches.forEach(match => {
                const card = document.createElement('div');
                
                // ステータスごとのカラー・バッジデザイン分岐
                let statusBadge = '';
                let cardStyle = 'border-gray-200 bg-white';

                if (match.status === 'live') {
                    statusBadge = '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-bold bg-red-100 text-red-700 animate-pulse"><span class="w-1.5 h-1.5 mr-1 bg-red-600 rounded-full"></span>LIVE</span>';
                    cardStyle = 'border-red-400 ring-2 ring-red-500/10 bg-white';
                } else if (match.status === 'done') {
                    statusBadge = '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium bg-gray-100 text-gray-600">終了</span>';
                    cardStyle = 'border-gray-200 bg-gray-50/60 opacity-85';
                } else {
                    statusBadge = '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium bg-blue-50 text-blue-600">予定</span>';
                }

                const icon = sportIcons[match.sport] || '🏆';
                const score1 = match.score1 !== null ? match.score1 : '-';
                const score2 = match.score2 !== null ? match.score2 : '-';

                // 対戦形式（チーム2が存在する）か、単独種目（リレーや式典など）かでUIを切り替え
                let teamContentHtml = '';
                if (match.team2 && match.team2.trim() !== '') {
                    // 勝者のフォントを太字にする装飾（試合終了時のみ）
                    let weight1 = match.status === 'done' && match.score1 > match.score2 ? 'font-bold text-gray-900' : 'text-gray-700';
                    let weight2 = match.status === 'done' && match.score2 > match.score1 ? 'font-bold text-gray-900' : 'text-gray-700';
                    
                    teamContentHtml = `
                        <div class="flex items-center justify-between my-2 py-1">
                            <div class="flex-1 text-right pr-3 truncate text-sm sm:text-base ${weight1}">${match.team1}</div>
                            <div class="bg-gray-100/80 px-2.5 py-1 rounded-md text-base font-bold min-w-[70px] text-center border border-gray-200 shadow-inner">
                                ${score1} <span class="text-gray-400 text-xs font-normal mx-0.5">vs</span> ${score2}
                            </div>
                            <div class="flex-1 text-left pl-3 truncate text-sm sm:text-base ${weight2}">${match.team2}</div>
                        </div>
                    `;
                } else {
                    // リレー・開閉会式などの単独表示用UI
                    teamContentHtml = `
                        <div class="my-3 text-center">
                            <div class="text-xs sm:text-sm font-medium text-slate-700 bg-slate-100/70 border border-slate-200 rounded-lg px-3 py-2 inline-block max-w-full break-words">
                                ${match.team1}
                            </div>
                        </div>
                    `;
                }

                card.className = `p-4 rounded-xl border ${cardStyle} shadow-sm hover:shadow-md transition-all duration-200 flex flex-col justify-between`;
                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between text-xs pb-2 border-b border-gray-100">
                            <div class="flex items-center space-x-1 font-bold text-gray-800">
                                <span class="text-base leading-none">${icon}</span>
                                <span>${match.sport}</span>
                                <span class="text-gray-300 font-normal">|</span>
                                <span class="text-gray-500 font-medium">${match.day}日目 ${match.time}</span>
                            </div>
                            <div>${statusBadge}</div>
                        </div>
                        
                        <div class="py-2">
                            <div class="text-[11px] text-indigo-600 font-semibold tracking-wide uppercase">${match.round}</div>
                            ${teamContentHtml}
                        </div>
                    </div>

                    <div class="text-[11px] text-gray-400 flex items-center justify-end space-x-1 pt-1.5 mt-1 border-t border-gray-100/60">
                        <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span>${match.venue}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // カウントダウンタイマーの更新関数
        function updateCountdown() {
            const timerEl = document.getElementById('countdown-timer');
            if (!timerEl || typeof TARGET_DATE === 'undefined') return;

            const now = new Date();
            const diff = TARGET_DATE - now;

            // 大会時刻を過ぎている場合
            if (diff <= 0) {
                timerEl.innerHTML = "<span class='text-yellow-300 font-bold animate-pulse'>🔥 大会開催中！ 🔥</span>";
                return;
            }

            // 残り時間の計算
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            let html = '⏱️ 大会まで ';
            if (days > 0) html += `<span class="font-bold text-yellow-300 text-base">${days}</span>日 `;
            html += `<span class="font-bold text-yellow-300 text-base">${String(hours).padStart(2, '0')}</span>時間`;
            html += `<span class="font-bold text-yellow-300 text-base">${String(minutes).padStart(2, '0')}</span>分`;
            html += `<span class="font-bold text-yellow-300 text-base">${String(seconds).padStart(2, '0')}</span>秒`;
            
            timerEl.innerHTML = html;
        }
    </script>
</body>
</html>
