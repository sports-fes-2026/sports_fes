<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>管理者画面 スポーツ大会 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#e8192c;--dark:#080808;--mid:#111;--card:#161616;--card2:#1c1c1c;
    --border:#2a2a2a;--border2:#222;--text:#ececec;--muted:#555;--muted2:#777;--white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}

  /* LOGIN */
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .login-box{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--red);border-radius:4px;padding:32px 24px;width:100%;max-width:360px;}
  .login-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:4px;}
  .login-sub{font-size:11px;color:var(--muted2);margin-bottom:24px;letter-spacing:1px;}
  .login-label{font-size:10px;color:var(--muted2);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:6px;display:block;}
  .login-input{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:3px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;margin-bottom:14px;}
  .login-input:focus{border-color:var(--red);}
  .login-btn{width:100%;background:var(--red);border:none;color:white;padding:12px;border-radius:3px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:1px;transition:opacity 0.15s;}
  .login-btn:hover{opacity:0.85;}
  .login-err{font-size:11px;color:var(--red);margin-top:10px;display:none;}

  /* MAIN */
  .main-wrap{display:none;}
  header{background:var(--dark);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;display:flex;align-items:center;gap:8px;}
  .logo-bar{width:3px;height:16px;background:var(--red);border-radius:1px;}
  .logo span{color:var(--red);}
  .admin-badge{font-size:9px;background:var(--red);color:white;padding:2px 6px;border-radius:2px;font-weight:700;letter-spacing:1px;}
  .logout-btn{background:none;border:1px solid var(--border);color:var(--muted2);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
  .logout-btn:hover{border-color:var(--red);color:var(--red);}

  /* TABS */
  nav{background:var(--mid);display:flex;border-bottom:1px solid var(--border2);overflow-x:auto;scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  .tab-btn{background:none;border:none;color:var(--muted);padding:0 20px;height:44px;cursor:pointer;font-size:12px;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;font-weight:700;letter-spacing:0.5px;flex-shrink:0;}
  .tab-btn.active{color:var(--white);border-bottom-color:var(--red);}

  .content{padding:16px;max-width:680px;margin:0 auto;}
  .tab-page{display:none;}
  .tab-page.active{display:block;}

  /* SECTION */
  .sec-title{font-size:9px;color:var(--muted);letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .sec-title::after{content:'';flex:1;height:1px;background:var(--border2);}

  /* CARDS */
  .match-list{display:flex;flex-direction:column;gap:1px;margin-bottom:20px;}
  .match-card{background:var(--card);border-left:2px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;}
  .match-card+.match-card{border-top:1px solid var(--border2);}
  .match-card:first-child{border-radius:6px 6px 0 0;}
  .match-card:last-child{border-radius:0 0 6px 6px;}
  .match-card.live{border-left-color:var(--red);}
  .match-card.done{border-left-color:var(--muted);}
  .match-time{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);min-width:40px;}
  .match-info{flex:1;min-width:0;}
  .match-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .match-place{font-size:10px;color:var(--muted);margin-top:1px;}
  .match-actions{display:flex;gap:6px;flex-shrink:0;align-items:center;}

  /* STATUS BTNS */
  .s-btn{border:none;padding:4px 8px;border-radius:2px;cursor:pointer;font-size:10px;font-weight:700;font-family:'Noto Sans JP',sans-serif;letter-spacing:0.5px;transition:opacity 0.15s;}
  .s-btn:hover{opacity:0.8;}
  .s-btn.upcoming{background:var(--border);color:var(--muted2);}
  .s-btn.live{background:var(--red);color:white;}
  .s-btn.done{background:#333;color:var(--muted2);}
  .s-btn.active-status{outline:2px solid white;outline-offset:1px;}

  /* SCORE INPUT */
  .score-wrap{display:flex;align-items:center;gap:4px;}
  .score-inp{width:38px;background:var(--dark);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:2px;font-size:13px;font-family:'Bebas Neue',sans-serif;text-align:center;outline:none;}
  .score-inp:focus{border-color:var(--red);}
  .score-sep{color:var(--muted);font-size:12px;}
  .save-btn{background:var(--red);border:none;color:white;padding:5px 10px;border-radius:2px;cursor:pointer;font-size:10px;font-weight:700;font-family:'Noto Sans JP',sans-serif;transition:opacity 0.15s;}
  .save-btn:hover{opacity:0.85;}

  /* FILTER */
  .filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none;padding-bottom:2px;}
  .filter-row::-webkit-scrollbar{display:none;}
  .chip{background:transparent;border:1px solid var(--border);color:var(--muted2);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:11px;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;flex-shrink:0;font-weight:700;}
  .chip.active{background:var(--red);border-color:var(--red);color:white;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);color:var(--text);padding:10px 18px;border-radius:4px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}

  /* LIVE indicator */
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .live-dot{display:inline-block;width:5px;height:5px;background:var(--red);border-radius:50%;animation:pulse 1s infinite;margin-right:4px;vertical-align:middle;}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-title">ADMIN <span style="color:var(--red)">LOGIN</span></div>
    <div class="login-sub">スポーツ大会 2026 管理者画面</div>
    <label class="login-label">パスワード</label>
    <input type="password" class="login-input" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err">パスワードが違います</div>
  </div>
</div>

<div class="main-wrap" id="main-wrap">
  <header>
    <div class="logo"><div class="logo-bar"></div>SPORTS <span>2026</span> <span class="admin-badge">ADMIN</span></div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </header>
  <nav>
    <button class="tab-btn active" onclick="goTab('schedule', event)">📅 スケジュール管理</button>
    <button class="tab-btn" onclick="goTab('tournament', event)">🏆 トーナメント一括管理</button>
  </nav>
  <div class="content">

    <div class="tab-page active" id="tab-schedule">
      <div class="filter-row" id="day-chips">
        <button class="chip active" onclick="setAdminDay(0)">全日程</button>
        <button class="chip" onclick="setAdminDay(1)">1日目</button>
        <button class="chip" onclick="setAdminDay(2)">2日目</button>
      </div>
      <div class="filter-row" id="cat-chips"></div>
      <div id="admin-schedule-list"></div>
    </div>

    <div class="tab-page" id="tab-tournament">
      <div class="filter-row" id="sport-chips"></div>
      <div id="admin-tournament-list"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>

<script>
const ADMIN_PASSWORD = "sports2026";
window._adminLoggedIn = false;

window.doLogin = function() {
  const pw = document.getElementById('pw-input').value.trim();
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('main-wrap').style.display = 'block';
    window._adminLoggedIn = true;
    if (window._initFirebaseModule) {
      window._initFirebaseModule();
    }
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
};
window.doLogout = function() {
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('main-wrap').style.display = 'none';
  document.getElementById('pw-input').value = '';
  window._adminLoggedIn = false;
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKyq02jcUWoqgy_SXL4_TLGXEKQvXMuMw",
  authDomain: "sports-fes-dc27c.firebaseapp.com",
  databaseURL: "https://sports-fes-dc27c-default-rtdb.firebaseio.com",
  projectId: "sports-fes-dc27c",
  storageBucket: "sports-fes-dc27c.firebasestorage.app",
  messagingSenderId: "649731204042",
  appId: "1:649731204042:web:7f1acd9887339a47c3a533"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── STATE ──
let adminDay = 0, adminCat = 'すべて', adminSport = 'サッカー';
let liveData = { matches: {} };

window._initFirebaseModule = function() {
  onValue(ref(db, 'matches'), snap => {
    liveData.matches = snap.val() || {};
    renderAdminSchedule();
    renderAdminTournament();
  });
};

// 起動時にすでにログインフラグが立っていれば初期化
if (window._adminLoggedIn) {
  window._initFirebaseModule();
}

// ── TABS ──
window.goTab = function(id, e) {
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  e.currentTarget.classList.add('active');
};

// ── DATA MERGE ──
function getMergedMatches() {
  return matchData.map(m => {
    const fb = liveData.matches[m.id] || {};
    return {
      ...m,
      status: fb.status || m.status,
      score1: fb.score1 !== undefined ? fb.score1 : m.score1,
      score2: fb.score2 !== undefined ? fb.score2 : m.score2,
      team1: fb.team1 || m.team1,
      team2: fb.team2 || m.team2,
    };
  });
}

// ── SCHEDULE RENDER ──
window.setAdminDay = function(d) {
  adminDay = d;
  adminCat = 'すべて';
  document.querySelectorAll('#day-chips .chip').forEach((b,i) => b.classList.toggle('active', i === d));
  renderAdminSchedule();
};

window.setAdminCat = function(c) {
  adminCat = c;
  renderAdminSchedule();
};

function renderAdminSchedule() {
  const data = getMergedMatches();
  const dayF = adminDay === 0 ? data : data.filter(m => m.day === adminDay);
  
  // sportListがdata.jsにあれば使用、なければデータから抽出
  const cats = ['すべて', ...(typeof sportList !== 'undefined' ? sportList : [...new Set(data.map(m => m.sport))])];
  
  document.getElementById('cat-chips').innerHTML = cats.map(c =>
    `<button class="chip ${c === adminCat ? 'active' : ''}" onclick="setAdminCat('${c}')">${c}</button>`
  ).join('');
  
  const filtered = adminCat === 'すべて' ? dayF : dayF.filter(m => m.sport === adminCat);
  const isRelayOrCeremony = m => m.sport === 'リレー' || m.sport === 'その他';

  document.getElementById('admin-schedule-list').innerHTML = filtered.map(m => `
    <div class="match-list">
    <div class="match-card ${m.status}">
      <div class="match-time">${m.time}</div>
      <div class="match-info">
        <div class="match-name">${m.status === 'live' ? '<span class="live-dot"></span>' : ''}${m.sport} ${m.round}</div>
        <div class="match-place" style="font-size:11px;font-weight:700;margin:2px 0;">${isRelayOrCeremony(m) ? m.team1 : `${m.team1} vs ${m.team2}`}</div>
        ${m.status==='done'&&m.score1!==null&&m.score2!==null?`<div style="font-size:11px;color:#ffcc00;font-weight:900;">🏆 ${m.score1>m.score2?m.team1:m.score2>m.score1?m.team2:'引き分け'}</div>`:''}
        <div class="match-place">📍 ${m.venue}</div>
      </div>
      <div class="match-actions">
        <div style="display:flex;flex-direction:column;gap:4px;margin-right:6px;">
          <button class="s-btn upcoming ${m.status==='upcoming'?'active-status':''}" onclick="setStatus('${m.id}','upcoming')">予定</button>
          <button class="s-btn live ${m.status==='live'?'active-status':''}" onclick="setStatus('${m.id}','live')">LIVE</button>
          <button class="s-btn done ${m.status==='done'?'active-status':''}" onclick="setStatus('${m.id}','done')">終了</button>
        </div>
        <div>
          ${isRelayOrCeremony(m) ? '' : `
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">
            <input class="score-inp" id="s1-${m.id}" placeholder="点" value="${m.score1 !== null ? m.score1 : ''}" style="width:44px;">
            <span style="color:var(--muted);font-size:12px;">-</span>
            <input class="score-inp" id="s2-${m.id}" placeholder="点" value="${m.score2 !== null ? m.score2 : ''}" style="width:44px;">
          </div>
          <div style="display:flex;gap:4px;margin-bottom:4px;">
            <input class="score-inp" id="t1-${m.id}" placeholder="チーム1" value="${m.team1}" style="width:70px;">
            <input class="score-inp" id="t2-${m.id}" placeholder="チーム2" value="${m.team2}" style="width:70px;">
          </div>
          `}
          <button class="save-btn" style="display:block;margin-top:2px;width:100%;" onclick="saveMatch('${m.id}')">保存</button>
        </div>
      </div>
    </div>
    </div>
  `).join('');
}

// ── 丸数字による自動勝ち上がりアルゴリズム ──
const circleNumbers = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳","㉑"];

const route21 = {
  "①": { to: "⑧", slot: "team2" },  "②": { to: "⑨", slot: "team2" },  "③": { to: "⑩", slot: "team2" },
  "④": { to: "⑫", slot: "team2" },  "⑤": { to: "⑬", slot: "team2" },  "⑥": { to: "⑭", slot: "team2" },
  "⑦": { to: "⑯", slot: "team2" },  "⑧": { to: "⑮", slot: "team1" },  "⑨": { to: "⑮", slot: "team2" },
  "⑩": { to: "⑯", slot: "team1" },  "⑪": { to: "⑱", slot: "team2" },  "⑫": { to: "⑰", slot: "team1" },
  "⑬": { to: "⑰", slot: "team2" },  "⑭": { to: "⑱", slot: "team1" },  "⑮": { to: "⑲", slot: "team1" },
  "⑯": { to: "⑲", slot: "team2" },  "⑰": { to: "⑳", slot: "team1" },  "⑱": { to: "⑳", slot: "team2" },
  "⑲": { to: "㉑", slot: "team1" },  "⑳": { to: "㉑", slot: "team2" }
};

const route4 = {
  "①": { to: "③", slot: "team2" },
  "②": { to: "④", slot: "team2" },
  "③": { to: "④", slot: "team1" }
};

function getRoundCircle(roundStr) {
  for (let num of circleNumbers) {
    if (roundStr.includes(num)) return num;
  }
  return null;
}

async function advanceWinner(sport, currentRoundStr, winnerName) {
  const currentCircle = getRoundCircle(currentRoundStr);
  if (!currentCircle) return;

  const isJoshi = ["女子バスケ", "女子バレー", "女子バドミントン"].includes(sport);
  const route = isJoshi ? route4 : route21;
  const rule = route[currentCircle];
  if (!rule) return; // 決勝の後は進出先なし

  // 全試合データから、同じ競技かつ進出先の丸数字を持つ試合を検索
  const nextMatch = matchData.find(m => m.sport === sport && getRoundCircle(m.round) === rule.to);
  if (nextMatch) {
    const nextMatchId = nextMatch.id;
    const currentFB = liveData.matches[nextMatchId] || {};
    const updates = { ...currentFB, [rule.slot]: winnerName };
    await set(ref(db, `matches/${nextMatchId}`), updates);
  }
}

// ── ACTION FUNCTIONS ──
window.setStatus = async function(id, status) {
  const current = liveData.matches[id] || {};
  await set(ref(db, `matches/${id}`), { ...current, status });
  showToast('ステータスを更新しました');
};

window.saveMatch = async function(id) {
  const allMatches = getMergedMatches();
  const m = allMatches.find(x => x.id === id);
  if (!m) return;

  const current = liveData.matches[id] || {};
  const isRelayOrCeremony = m.sport === 'リレー' || m.sport === 'その他';
  const updates = { ...current };

  if (!isRelayOrCeremony) {
    const s1 = document.getElementById(`s1-${id}`)?.value.trim();
    const s2 = document.getElementById(`s2-${id}`)?.value.trim();
    const t1 = document.getElementById(`t1-${id}`)?.value.trim();
    const t2 = document.getElementById(`t2-${id}`)?.value.trim();

    updates.score1 = (s1 !== '') ? Number(s1) : null;
    updates.score2 = (s2 !== '') ? Number(s2) : null;
    if (t1) updates.team1 = t1;
    if (t2) updates.team2 = t2;
    updates.status = 'done';

    // 厳密な勝者判定ロジック
    if (updates.score1 !== null && updates.score2 !== null && updates.score1 !== updates.score2) {
      const winner = updates.score1 > updates.score2 ? (updates.team1 || m.team1) : (updates.team2 || m.team2);
      if (winner && winner !== '-') {
        await advanceWinner(m.sport, m.round, winner);
      }
    }
  } else {
    updates.status = current.status || m.status;
  }

  await set(ref(db, `matches/${id}`), updates);
  showToast('保存しました！勝者が確定した場合は自動進出させました');
};

// ── TOURNAMENT TAB RENDER ──
window.setAdminSport = function(s) {
  adminSport = s;
  document.querySelectorAll('#sport-chips .chip').forEach(b =>
    b.classList.toggle('active', b.textContent === s)
  );
  renderAdminTournamentDetail();
};

function renderAdminTournament() {
  const sports = typeof sportList !== 'undefined' ? sportList.filter(s => s !== 'リレー' && s !== 'その他') : [];
  document.getElementById('sport-chips').innerHTML = sports.map(s =>
    `<button class="chip ${s === adminSport ? 'active' : ''}" onclick="setAdminSport('${s}')">${s}</button>`
  ).join('');
  renderAdminTournamentDetail();
}

function getRoundGroupIndex(roundStr, isJoshi) {
  const circle = getRoundCircle(roundStr);
  if (!circle) return -1;
  if (isJoshi) {
    if (["①", "②", "③"].includes(circle)) return 0;
    if (circle === "④") return 1;
  } else {
    if (["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑪"].includes(circle)) return 0;
    if (["⑧", "⑨", "⑩", "⑫", "⑬", "⑭"].includes(circle)) return 1;
    if (["⑮", "⑯", "⑰", "⑱"].includes(circle)) return 2;
    if (["⑲", "⑳"].includes(circle)) return 3;
    if (circle === "㉑") return 4;
  }
  return -1;
}

function renderAdminTournamentDetail() {
  const allMatches = getMergedMatches();
  const sportMatches = allMatches.filter(m => m.sport === adminSport);
  if (sportMatches.length === 0) {
    document.getElementById('admin-tournament-list').innerHTML = '<div style="color:var(--muted);font-size:12px;">該当するトーナメント試合がありません</div>';
    return;
  }

  const isJoshi = ["女子バスケ", "女子バレー", "女子バドミントン"].includes(adminSport);
  const roundNames = isJoshi ? ["予選・準決勝", "決勝"] : ["1回戦", "2回戦", "準々決勝", "準決勝", "決勝"];
  
  // ラウンドごとにグループ化
  const grouped = roundNames.map(() => []);
  sportMatches.forEach(m => {
    const idx = getRoundGroupIndex(m.round, isJoshi);
    if (idx !== -1) grouped[idx].push(m);
  });

  // 丸数字の順序に並び替え
  grouped.forEach(list => {
    list.sort((a, b) => {
      const ca = getRoundCircle(a.round), cb = getRoundCircle(b.round);
      return circleNumbers.indexOf(ca) - circleNumbers.indexOf(cb);
    });
  });

  let html = '';
  grouped.forEach((list, ri) => {
    if (list.length === 0) return;
    html += `<div class="sec-title">${roundNames[ri]}</div><div class="match-list">`;
    list.forEach(m => {
      const w1 = m.status === 'done' && m.score1 !== null && m.score2 !== null && m.score1 > m.score2;
      const w2 = m.status === 'done' && m.score1 !== null && m.score2 !== null && m.score2 > m.score1;
      html += `
        <div class="match-card ${m.status}">
          <div class="match-time" style="min-width:55px;">${m.round}</div>
          <div class="match-info">
            <div style="display:flex;gap:4px;margin-bottom:4px;">
              <input class="score-inp" id="t1-tm-${m.id}" value="${m.team1}" placeholder="チーム1" style="width:75px;${w1?'border-color:var(--red);font-weight:bold;':''}">
              <span class="score-sep">vs</span>
              <input class="score-inp" id="t2-tm-${m.id}" value="${m.team2}" placeholder="チーム2" style="width:75px;${w2?'border-color:var(--red);font-weight:bold;':''}">
            </div>
            <div style="display:flex;gap:4px;align-items:center;">
              <input class="score-inp" id="s1-tm-${m.id}" value="${m.score1 !== null ? m.score1 : ''}" placeholder="点" style="width:44px;">
              <span class="score-sep">-</span>
              <input class="score-inp" id="s2-tm-${m.id}" value="${m.score2 !== null ? m.score2 : ''}" placeholder="点" style="width:44px;">
              <button class="save-btn" onclick="saveTournamentScore('${m.id}')">保存</button>
            </div>
          </div>
          <div style="font-size:10px;color:var(--muted2);text-align:right;">
            <div>${m.time}</div>
            <div>${m.venue.split(' ')[0]}</div>
          </div>
        </div>`;
    });
    html += '</div>';
  });
  document.getElementById('admin-tournament-list').innerHTML = html;
}

window.saveTournamentScore = async function(id) {
  const allMatches = getMergedMatches();
  const m = allMatches.find(x => x.id === id);
  if (!m) return;

  const current = liveData.matches[id] || {};
  const s1 = document.getElementById(`s1-tm-${id}`).value.trim();
  const s2 = document.getElementById(`s2-tm-${id}`).value.trim();
  const t1 = document.getElementById(`t1-tm-${id}`).value.trim();
  const t2 = document.getElementById(`t2-tm-${id}`).value.trim();

  const updates = { ...current };
  updates.score1 = (s1 !== '') ? Number(s1) : null;
  updates.score2 = (s2 !== '') ? Number(s2) : null;
  if (t1) updates.team1 = t1;
  if (t2) updates.team2 = t2;
  updates.status = 'done';

  // トーナメント側から保存した際も自動勝ち上がりを実行
  if (updates.score1 !== null && updates.score2 !== null && updates.score1 !== updates.score2) {
    const winner = updates.score1 > updates.score2 ? updates.team1 : updates.team2;
    if (winner && winner !== '-') {
      await advanceWinner(m.sport, m.round, winner);
    }
  }

  await set(ref(db, `matches/${id}`), updates);
  showToast('トーナメントデータを保存・更新しました');
};

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
